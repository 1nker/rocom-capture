name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' # 当推送形如 v1.0.0 的 tag 时，触发 Release
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build for Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            zig_target: x86_64-linux-musl
          - arch: arm64
            goarch: arm64
            zig_target: aarch64-linux-musl

    steps:
      # 1. 拉取代码 (v4 最新版)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 部署最新稳定版 Go 环境 (v5 最新版)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable' 
          cache: true

      # 3. 部署最新 LTS 版 Node.js 环境 (v4 最新版)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*' 
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # 4. 部署最新版 Zig 编译器 (自动获取 latest)
      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: latest 

      # 5. 构建前端
      - name: Build Web Frontend
        run: |
          cd web
          npm install
          npm run build
          cd ..

      # 6. 使用 Zig 静态交叉编译 CGO
      - name: Build Go Binary
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CC: zig cc -target ${{ matrix.zig_target }}
          CXX: zig c++ -target ${{ matrix.zig_target }}
        run: |
          mkdir -p dist
          # 加上 -s -w 减小编译体积
          go build -ldflags="-s -w" -o dist/rocom-capture-linux-${{ matrix.arch }} ./cmd/rocom-capture

      # 7. 上传编译产物 (v4 最新版)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rocom-capture-linux-${{ matrix.arch }}
          path: dist/rocom-capture-linux-${{ matrix.arch }}
          retention-days: 7 # 构件在 Actions 页面保留 7 天

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # 仅在打 tag 时 (如 v1.0.0) 执行发布逻辑
    if: startsWith(github.ref, 'refs/tags/v')
    
    # GH Actions 新策略：需要显式赋予写入权限才能发布 Release
    permissions:
      contents: write 

    steps:
      # 1. 下载前一个 Job 打包的所有构件 (v4 最新版)
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 2. 发布到 GitHub Releases (v2 最新版)
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # 自动生成 Release 描述/更新日志
          files: |
            artifacts/rocom-capture-linux-amd64/rocom-capture-linux-amd64
            artifacts/rocom-capture-linux-arm64/rocom-capture-linux-arm64
